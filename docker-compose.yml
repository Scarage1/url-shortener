services:

  api:
    build: .
    container_name: url-api

    ports:
      - "8080:8080"

    environment:
      PORT: 8080

      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: urlshortener

      REDIS_URL: redis:6379

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_started


  postgres:
    image: postgres:16
    container_name: url-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: urlshortener

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d urlshortener"]
      interval: 5s
      timeout: 5s
      retries: 5


  redis:
    image: redis:7-alpine
    container_name: url-redis

    ports:
      - "6379:6379"


volumes:
  postgres_data: